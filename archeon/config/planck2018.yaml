# Planck 2018 best-fit cosmological parameters (TT,TE,EE+lowE+lensing)
# Reference: Planck Collaboration VI, A&A 641, A6 (2020), Table 2
# https://arxiv.org/abs/1807.06209

cosmology:
  # Hubble constant [km/s/Mpc]
  H0: 67.36
  h: 0.6736  # H0 / 100

  # Density parameters (dimensionless fractions of critical density)
  Omega_b_h2: 0.02237    # Baryon density * h^2
  Omega_cdm_h2: 0.1200   # Cold dark matter density * h^2
  Omega_b: 0.0493        # Baryon fraction
  Omega_cdm: 0.2645      # CDM fraction
  Omega_m: 0.3153        # Total matter (baryons + CDM)
  Omega_Lambda: 0.6847   # Dark energy (cosmological constant)
  Omega_r: 9.14e-5       # Radiation (photons + neutrinos)
  Omega_k: 0.0           # Spatial curvature (flat universe)

  # Primordial power spectrum
  n_s: 0.9649            # Scalar spectral index
  A_s: 2.1e-9            # Scalar amplitude at pivot scale k* = 0.05 Mpc^-1
  k_pivot: 0.05          # Pivot scale [Mpc^-1]
  r: 0.0                 # Tensor-to-scalar ratio (upper bound ~0.06)

  # Reionization
  tau_reio: 0.0544       # Optical depth to reionization
  z_reio: 7.67           # Redshift of reionization

  # Derived parameters
  sigma_8: 0.8111        # RMS matter fluctuations in 8 Mpc/h spheres
  t0: 13.797             # Age of the universe [Gyr]
  z_eq: 3387             # Matter-radiation equality redshift
  z_rec: 1089.92         # Recombination redshift
  z_drag: 1059.94        # Baryon drag epoch redshift

physical_constants:
  c: 299792.458          # Speed of light [km/s]
  c_cgs: 2.99792458e+10  # Speed of light [cm/s]
  G: 6.67430e-11         # Newton's gravitational constant [m^3 kg^-1 s^-2]
  k_B: 1.380649e-23      # Boltzmann constant [J/K]
  k_B_eV: 8.617333e-5    # Boltzmann constant [eV/K]
  hbar: 1.054571817e-34  # Reduced Planck constant [J s]
  m_e: 9.1093837e-31     # Electron mass [kg]
  m_e_eV: 0.51099895e+6  # Electron mass [eV/c^2]
  m_p: 1.67262192e-27    # Proton mass [kg]
  sigma_T: 6.6524587e-29 # Thomson cross section [m^2]
  T_cmb: 2.7255          # CMB temperature today [K]
  E_ion_H: 13.6          # Hydrogen ionization energy [eV]
  N_eff: 3.046           # Effective number of neutrino species
  Mpc_to_m: 3.0857e+22   # 1 Mpc in meters
  Gyr_to_s: 3.1557e+16   # 1 Gyr in seconds

# Unit conversion helpers
units:
  H0_si: 2.1838e-18     # H0 in s^-1 (67.36 km/s/Mpc converted)
