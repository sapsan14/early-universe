<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#05060f" />
    <title>Cosmic Academy · Космическая академия ARCHEON</title>
    <meta
      name="description"
      content="Интерактивная школа космологии: путешествуй по 13,8 миллиардам лет истории Вселенной, играй с её фундаментальными параметрами и охоться на аномалии в реликтовом излучении."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;0,700;1,500&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
    />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      :root {
        color-scheme: dark;
        --serif: 'Cormorant Garamond', 'Iowan Old Style', 'Palatino Linotype', Georgia, serif;
        --sans: 'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif;
        --mono: 'JetBrains Mono', ui-monospace, monospace;
      }
      html, body, #root { height: 100%; }
      body {
        font-family: var(--sans);
        background:
          radial-gradient(1200px 800px at 20% -10%, #2a1b6c 0%, transparent 60%),
          radial-gradient(1000px 700px at 90% 10%, #4a1d6c 0%, transparent 55%),
          radial-gradient(900px 700px at 50% 110%, #1a3a8c 0%, transparent 55%),
          linear-gradient(180deg, #05060f 0%, #0a0e22 100%);
        background-attachment: fixed;
        color: #e8ecff;
        min-height: 100%;
        overflow-x: hidden;
        text-rendering: optimizeLegibility;
        -webkit-font-smoothing: antialiased;
      }
      a { color: inherit; text-decoration: none; }
      button { font-family: inherit; }
      input[type="range"] { -webkit-appearance: none; appearance: none; width: 100%; }
      input[type="range"]::-webkit-slider-thumb {
        -webkit-appearance: none;
        appearance: none;
        width: 18px; height: 18px;
        border-radius: 50%;
        background: #fff;
        cursor: grab;
        box-shadow: 0 0 0 4px rgba(255, 213, 107, 0.25), 0 4px 12px rgba(255, 213, 107, 0.45);
        margin-top: -7px;
      }
      input[type="range"]::-webkit-slider-thumb:active { cursor: grabbing; }
      input[type="range"]::-webkit-slider-runnable-track {
        height: 4px;
        border-radius: 999px;
        background: transparent;
      }
      input[type="range"]::-moz-range-thumb {
        width: 18px; height: 18px;
        border: none; border-radius: 50%;
        background: #fff;
        cursor: grab;
        box-shadow: 0 0 0 4px rgba(255, 213, 107, 0.25), 0 4px 12px rgba(255, 213, 107, 0.45);
      }
      ::selection { background: rgba(255, 213, 107, 0.4); color: #1c1530; }

      @keyframes float-up {
        from { opacity: 0; transform: translateY(12px); }
        to { opacity: 1; transform: translateY(0); }
      }
      @keyframes pulse-glow {
        0%, 100% { box-shadow: 0 0 0 0 rgba(255, 213, 107, 0.5); }
        50% { box-shadow: 0 0 0 12px rgba(255, 213, 107, 0); }
      }
      @keyframes spin-slow { to { transform: rotate(360deg); } }
      @keyframes shimmer {
        0% { background-position: -200% 0; }
        100% { background-position: 200% 0; }
      }

      .fade-in { animation: float-up 0.5s cubic-bezier(.2,.8,.2,1) both; }
      .pulse { animation: pulse-glow 2.4s ease-out infinite; }

      h1, h2, h3, h4 { font-family: var(--serif); font-weight: 700; }
      ::-webkit-scrollbar { width: 10px; height: 10px; }
      ::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); }
      ::-webkit-scrollbar-thumb { background: rgba(159, 144, 240, 0.3); border-radius: 999px; }
      ::-webkit-scrollbar-thumb:hover { background: rgba(159, 144, 240, 0.5); }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
